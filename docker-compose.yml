version: "3.8"

services:
  neo4j:
    image: neo4j:5.17.0
    container_name: neo4j_graph
    ports:
      - "7474:7474" # HTTP UI
      - "7687:7687" # Bolt Protocol
    environment:
      - NEO4J_AUTH=${NEO4J_USER}/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
      - ./docker/neo4j-init:/var/lib/neo4j/import # To load the init script
    networks:
      - graph_network
    healthcheck:
      test:
        [
          "CMD",
          "cypher-shell",
          "-u",
          "${NEO4J_USER}",
          "-p",
          "${NEO4J_PASSWORD}",
          "RETURN 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 10

  redis_vector:
    image: redis/redis-stack-server:latest
    container_name: redis_vector_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - graph_network

  backend:
    build:
      context: ./backend
    container_name: fastapi_backend
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    depends_on:
      neo4j:
        condition: service_healthy
      redis_vector:
        condition: service_started
    networks:
      - graph_network
    volumes:
      - ./backend:/app

  # frontend:
  #   build:
  #     context: ./frontend
  #   container_name: nextjs_frontend
  #   ports:
  #     - "3000:3000"
  #   env_file:
  #     - .env
  #   depends_on:
  #     - backend
  #   networks:
  #     - graph_network

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:
  redis_data:

networks:
  graph_network:
    driver: bridge
